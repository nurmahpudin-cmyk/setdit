services:
  setdit-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: setdit-backend
    ports:
      - "5100:5100"
    environment:
      - NODE_ENV=production
      - PORT=5100
      - DATABASE_URL=postgresql://postgres:PKPS@2020@host.docker.internal:5432/setdit?schema=public
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      - ADMIN_EMAIL=admin@setdit.local
      - ADMIN_PASSWORD=Admin123!
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/.wwebjs_auth:/app/.wwebjs_auth
      - ./backend/.wwebjs_cache:/app/.wwebjs_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  setdit-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5100/api
    container_name: setdit-frontend
    ports:
      - "5101:5101"
    environment:
      - API_URL=http://setdit-backend:5100/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - setdit-backend
